    <h2>Customer Reviews </h2>

    <form onsubmit="submitReview(event)">

        <select id="rating">
            <option>⭐</option>
            <option>⭐⭐</option>
            <option>⭐⭐⭐</option>
            <option>⭐⭐⭐⭐</option>
            <option>⭐⭐⭐⭐⭐</option>

        <textarea id="reviewText" placeholder="Write Review"></textarea>

        <button type="submit">Submit Review</button>

    </form>

    <div id="reviewContainer"></div>

</section>
